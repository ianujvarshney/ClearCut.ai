services:
  api:
    build: .
    env_file: .env
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - redis
    restart: unless-stopped
  worker:
    build: .
    command: node dist/src/workers/image.worker.js
    env_file: .env
    depends_on:
      - api
      - redis
      - mongo
    restart: unless-stopped
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
volumes:
  mongo_data:
