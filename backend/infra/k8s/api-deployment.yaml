apiVersion: apps/v1
kind: Deployment
metadata:
  name: clearcut-api
  namespace: clearcut
spec:
  replicas: 3
  selector:
    matchLabels:
      app: clearcut-api
  template:
    metadata:
      labels:
        app: clearcut-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/clearcut-api:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: clearcut-config
            - secretRef:
                name: clearcut-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: clearcut-api
  namespace: clearcut
spec:
  selector:
    app: clearcut-api
  ports:
    - port: 5000
      targetPort: 5000
