apiVersion: v1
kind: ConfigMap
metadata:
  name: clearcut-config
  namespace: clearcut
data:
  NODE_ENV: production
  PORT: "5000"
  API_PREFIX: /api/v1
  AI_PROVIDER_ORDER: fastapi,clipdrop,mock
  AI_INFERENCE_URL: http://ai-inference:8000
  AI_MODEL_DEFAULT: rmbg
  STORAGE_PROVIDER: s3
  OBJECT_STORAGE_REGION: us-east-1
  SIGNED_URL_TTL_SECONDS: "300"
  TEMP_OBJECT_TTL_HOURS: "24"
  METRICS_ENABLED: "true"
