apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: clearcut-api-hpa
  namespace: clearcut
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: clearcut-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: clearcut-worker-hpa
  namespace: clearcut
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: clearcut-image-worker
  minReplicas: 2
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
