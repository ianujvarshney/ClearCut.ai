apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clearcut-api
  namespace: clearcut
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 25m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    - host: api.clearcut.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: clearcut-api
                port:
                  number: 5000
